<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Portfolio</title>
    <meta name="description" content="Graphic design portfolio" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body id="top">
    <main>
      <section class="homeTop" aria-label="Home navigation">
        <div class="wrap homeTopInner">
          <div class="homeStage" role="presentation">
            <a class="homeName" href="index.html#top">Amelie Carrillo</a>

            <nav class="miniNav" aria-label="Top navigation">
              <a class="miniNavLink" href="#workStart">Work</a>
              <a class="miniNavLink" href="play.html">Play</a>
              <a class="miniNavLink" href="about.html">About</a>
            </nav>

            <img class="homeNametag" src="assets/squares/nametag.svg" alt="" />
            <img class="homeAboutText" src="assets/squares/about.svg" alt="" />

            <a class="homePin homePin--work" href="#workStart" aria-label="Work">
              <img src="assets/squares/work.svg" alt="" />
            </a>
            <a class="homePin homePin--play" href="play.html" aria-label="Play">
              <img src="assets/squares/play.svg" alt="" />
            </a>
            <a class="homePin homePin--resume" href="assets/squares/resume.svg" aria-label="Resume">
              <img src="assets/squares/resume.svg" alt="" />
            </a>
          </div>
        </div>
      </section>

      <section class="grid" id="workStart" aria-label="Work grid">
        <div class="wrap">
          <div class="cards" data-works></div>
        </div>
      </section>
    </main>

    <div class="workModalOverlay" hidden data-work-modal-overlay>
      <div class="workModal" role="dialog" aria-modal="true" aria-label="Work details" data-work-modal>
        <div class="workModalTop">
          <div class="workModalTopTitle" data-work-modal-title></div>
          <button class="workModalClose" type="button" aria-label="Close" data-work-modal-close>Close</button>
        </div>

        <div class="workModalBody">
          <div class="workModalLeft">
            <div class="workMetaDate" data-work-modal-date></div>
            <div class="workMetaDesc" data-work-modal-desc>
              Add a description of the work here.
            </div>
            <div class="workModalStack" data-work-modal-stack></div>
          </div>

          <div class="workModalRight" data-work-modal-gallery></div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
